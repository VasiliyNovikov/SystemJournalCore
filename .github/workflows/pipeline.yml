name: Validate & Publish
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test --no-build --logger trx --results-directory "TestResults-${{ matrix.os }}"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults-${{ matrix.os }}
        if: ${{ always() }}

  publish:
    if: ${{ false }} # disabled until publishing is intentionally enabled
    needs:
      - validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Package Version
        id: package_version
        run: echo "version=$(dotnet ./.github/workflows/PackageVersion.cs)" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack ./SystemJournalCore/SystemJournalCore.csproj -c Release --no-build -p:Version=${{ steps.package_version.outputs.version }}

      - name: Push
        run: dotnet nuget push **/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
